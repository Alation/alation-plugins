name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version and short SHA
        id: meta
        run: |
          version=$(jq -r '.version' .claude-plugin/plugin.json)
          short_sha=$(git rev-parse --short HEAD)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${version}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: ./bin/build-plugin-zip.sh

      - name: Build portable agent skills
        run: ./bin/build-agent-skills.sh

      - name: Build release body
        id: body
        run: |
          version="${{ steps.meta.outputs.version }}"
          body="## Alation Plugin v${version}"$'\n\n'

          description=$(jq -r '.description' .claude-plugin/plugin.json)
          body+="${description}"$'\n\n'

          body+="### Installation"$'\n\n'

          body+="**Claude Code (recommended):**"$'\n'
          body+="\`\`\`"$'\n'
          body+="/plugin marketplace add Alation/alation-plugins"$'\n'
          body+="/plugin install alation@alation-plugins"$'\n'
          body+="\`\`\`"$'\n\n'

          body+="**Claude Cowork:**"$'\n'
          body+="##### Marketplace"$'\n'
          body+="1. Go to \"Customize\" in the sidebar."$'\n'
          body+="2. Click the \"+\" icon next to \"Personal Plugins\" and select \"Add marketplace\""$'\n'
          body+="3. Add marketplace by URL: \`https://github.com/Alation/alation-plugins\`"$'\n'
          body+="4. Install \`Alation\`"$'\n\n'
          body+="##### Zip File"$'\n'
          body+="1. Download \`alation.zip\` below."$'\n'
          body+="2. Go to **Customize** in the sidebar."$'\n'
          body+="3. Click the \"+\" icon next to \"Personal Plugins\" and select \"Upload plugin\""$'\n'
          body+="4. Drag and drop or browse files to the downloaded zip file to install"$'\n\n'

          # Agent Skills section
          if [ -f dist/agent-skills.zip ]; then
            body+="### Portable Agent Skills (Codex / Gemini CLI)"$'\n\n'
            body+="Self-contained skills that work with any agent supporting the [Agent Skills](https://agentskills.io) format."$'\n'
            body+="Each skill bundles the Alation CLI — no separate installation needed. Requires Python 3.10+."$'\n\n'

            body+="**Quick install (interactive):**"$'\n'
            body+="\`\`\`bash"$'\n'
            body+="curl -fsSL https://raw.githubusercontent.com/Alation/alation-plugins/main/bin/install-agent-skills.sh | bash"$'\n'
            body+="\`\`\`"$'\n\n'

            body+="**Install globally:**"$'\n'
            body+="\`\`\`bash"$'\n'
            body+="curl -fsSL https://raw.githubusercontent.com/Alation/alation-plugins/main/bin/install-agent-skills.sh | bash -s -- --scope user"$'\n'
            body+="\`\`\`"$'\n\n'

            body+="**Snowflake Cortex Code:**"$'\n'
            body+="Install agent skills using the quick install above, then register the skills directory with Cortex:"$'\n'
            body+="\`\`\`bash"$'\n'
            body+="cortex skill add ~/.agents/skills"$'\n'
            body+="\`\`\`"$'\n'
            body+="Verify the skills are available:"$'\n'
            body+="\`\`\`bash"$'\n'
            body+="cortex skill list"$'\n'
            body+="\`\`\`"$'\n\n'

            body+="Available skills: "
            for d in dist/agent-skills/*/; do
              [ -f "${d}/SKILL.md" ] || continue
              body+="\`$(basename "$d")\` "
            done
            body+=$'\n'
          fi

          echo "$body" > dist/release-body.md

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v5
        with:
          name: alation-plugin
          path: |
            dist/alation.zip

      - name: Upload agent-skills artifact
        uses: actions/upload-artifact@v5
        with:
          name: agent-skills
          path: dist/agent-skills/*/
          if-no-files-found: ignore

      - name: Create GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.meta.outputs.release_tag }}"

          files=(dist/alation.zip)
          [ -f dist/agent-skills.zip ] && files+=(dist/agent-skills.zip)

          gh release create "$tag" \
            "${files[@]}" \
            --title "Alation Plugin $tag" \
            --notes-file dist/release-body.md
